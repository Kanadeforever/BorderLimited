; ===================================================================
; BorderLimited.ini — 配置示例（带完整中文注释）
;
; 此文件随发行版提供。
; 如果你不需要改配置，删除此文件即可——插件会自动用默认设置运行。
; 如果你要自定义，重命名为 BorderLimited.ini 放到 ASI 同目录即可。
;
; 格式说明：
;   - 所有配置必须在 [Default] 段内
;   - 键=值 格式，等号前后空格可选
;   - ; 开头的行为注释，可以放在独立行或值后面
;   - 键名区分大小写（Size 和 size 是不同的键）
;   - 编码：UTF-8（推荐）或 ANSI。UTF-16 不支持
;
; 虚拟键码参考（ToggleHotKeyCode）：
;   VK_F1=112  VK_F2=113  ...  VK_F10=121  VK_F11=122  VK_F12=123
;   VK_TAB=9   VK_RETURN=13  VK_SPACE=32  VK_ESCAPE=27
;   完整列表: https://learn.microsoft.com/en-us/windows/win32/inputdev/virtual-key-codes
;
; 修饰键掩码（ToggleHotKeyMod，可以组合相加）：
;   0=无修饰键  1=Alt  2=Ctrl  4=Shift  8=Win
;   例: 3=Alt+Ctrl  5=Alt+Shift  6=Ctrl+Shift
;
; 窗口尺寸模式（Size）：
;   FullScreen   — 全屏：窗口铺满整个显示器（默认，适合绝大多数游戏）
;   Custom       — 自定义：使用下方 PositionX/Y/W/H 精确指定坐标和大小
;   Borderless   — 无边框窗口：只移除边框和标题栏，保持窗口原来的位置和大小
; ===================================================================

[Default]

; ======== 窗口尺寸与位置 ========

; 窗口尺寸策略：FullScreen / Custom / Borderless
Size=FullScreen

; 自定义坐标（仅 Size=Custom 时生效，坐标相对于虚拟屏幕）
PositionX=0
PositionY=0
PositionW=1920
PositionH=1080

; 四边偏移量（像素）
; 正值=向内收缩（裁掉黑边），负值=向外扩展（遮盖缝隙）
; 例：OffsetL=2  左边向右缩 2px；OffsetR=-5  右边向外扩 5px
OffsetL=0
OffsetT=0
OffsetR=0
OffsetB=0

; ======== 窗口行为选项 ========

; 去边框后额外调用 ShowWindow(SW_MAXIMIZE)，有助于某些窗口管理器正确铺满
ShouldMaximize=1

; 窗口始终保持在最顶层（HWND_TOPMOST），切换程序也不会被遮挡
TopMost=0

; 移除 Win32 原生菜单栏（文件/编辑/帮助等）
; ⚠️ 不可逆！窗口关闭前无法恢复，热键恢复也不会重新创建菜单
RemoveMenus=0

; ClipCursor 锁定鼠标光标在窗口边界内，防止多屏时鼠标飘走
LockCursor=0

; 低层键盘钩子吞掉 Win 键按下事件，防止游戏中误触弹出开始菜单
DisableWinKey=0

; 隐藏 Windows 任务栏 + 扩展桌面工作区
HideWindowsTaskbar=0

; 将系统箭头光标替换为完全透明的空白光标，建议配合 LockCursor 使用
HideMouseCursor=0

; 禁止 Windows 对低分辨率窗口进行 DPI 虚拟化模糊缩放
; 副作用：老游戏窗口在 4K 屏上可能变得很小
OverrideDpi=0

; 写入 BorderLimited.log 日志文件（UTF-8 编码，每次启动游戏时清空）
; 设为 0 则不清空旧日志、不写新日志
EnableLog=1

; ======== 引擎适配 ========

; 启用虚幻引擎 3 D3D9 Hook 模式
; 适用于 Mass Effect / BioShock / Borderlands 等使用 DX9 的 UE3 游戏
; ⚠️ 非 UE3 游戏不要开启
UE3Mode=0

; UE3 模式下的伪造渲染分辨率（宽x高）
; 设为 0 表示自动使用桌面分辨率，通常不需要修改
UE3RenderWidth=0
UE3RenderHeight=0

; ======== 热键切换 ========

; 是否启用热键切换无边框状态
ToggleHotKey=1

; 热键虚拟键码（默认 121 = VK_F10）
ToggleHotKeyCode=121

; 热键修饰键掩码（默认 1 = Alt，即 Alt+F10）
; 0=无修饰键  1=Alt  2=Ctrl  4=Shift  8=Win
ToggleHotKeyMod=1

; 热键冷却间隔（毫秒），防止快速连按造成窗口反复切换闪烁
; 设为 0 禁用冷却
ToggleCooldownMs=2000

; 去边框后发送 WM_EXITSIZEMOVE 消息欺骗老游戏引擎
; 部分引擎在收到此消息前不会更新渲染缓冲区（hotsampling 场景有用）
SendExitSizeMove=0

; ======== 高级参数 ========

; 窗口检测轮询间隔（毫秒）
; 设为 0 表示"仅执行一次"：找到窗口后应用配置即退出，不再持续监控
; 建议值：500～2000ms，默认 1000ms
PollingIntervalMs=1000

; 样式设置前等待时间（毫秒）
; GameMaker 引擎建议设为 2000，其他引擎通常不需要
; UE3 模式下此设置无效（走 Hook 路径而非轮询）
DelayMs=0
